name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Get the code from the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24"
          cache: "npm"

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Clean the dist folder before building
      - name: Clean dist folder
        run: rm -rf dist

      # Build Angular app
      - name: Build Angular app
        run: npm run build:ghpages

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages # Target branch for GitHub Pages
          folder: dist/cdl-tracker/browser # Folder with the built Angular app
          clean: true
          commit-message: "Deploy Angular app via GitHub Actions"
          token: ${{ secrets.DEPLOY_TOKEN }} # Use the GitHub token for authentication
